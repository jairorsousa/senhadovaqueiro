name: senha-do-vaqueiro-prod

services:
  redis:
    image: redis:7-alpine
    container_name: senha-do-vaqueiro-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "${REDIS_PORT:-6381}", "--appendonly", "yes"]
    expose:
      - "${REDIS_PORT:-6381}"
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p $${REDIS_PORT:-6381} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: senha-do-vaqueiro/api:prod
    container_name: senha-do-vaqueiro-prod-api
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3400}
      REDIS_URL: redis://redis:${REDIS_PORT:-6381}
      ENABLE_PAYMENT_EXPIRATION_WORKER: "false"
    expose:
      - "${API_PORT:-3400}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.API_PORT || 3400) + ''/health'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: senha-do-vaqueiro/api:prod
    container_name: senha-do-vaqueiro-prod-worker
    restart: unless-stopped
    command: ["pnpm", "--filter", "api", "start:worker"]
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:${REDIS_PORT:-6381}
      ENABLE_PAYMENT_EXPIRATION_WORKER: "true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.senhadovaqueiro.com}
    image: senha-do-vaqueiro/web:prod
    container_name: senha-do-vaqueiro-prod-web
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3100}
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.senhadovaqueiro.com}
    expose:
      - "${WEB_PORT:-3100}"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 3100)).then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:2025.11.1
    container_name: senha-do-vaqueiro-prod-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    name: senha-do-vaqueiro-prod
    driver: bridge

volumes:
  redis_data:
    name: senha-do-vaqueiro-prod-redis
